<div class="course-list-container" style="padding: 1rem 0;">
  <!-- Live Search Input -->
  <div style="margin-bottom: 1.5rem;">
    <input
      [(ngModel)]="searchTerm"
      (ngModelChange)="onSearchChange()"
      placeholder="Search courses by name or code..."
      style="padding: 0.6rem 1rem; width: 320px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 0.95rem;"
    />
  </div>

  <h2>Available Courses</h2>

  <div *ngIf="isLoading" class="loading-spinner">
    <p>Loading courses...</p>
  </div>

  <div *ngIf="!isLoading">
    <div *ngIf="filteredCourses.length > 0; else noCourses" class="courses-grid">
      <div
        *ngFor="let c of filteredCourses; trackBy: trackByCourseId"
        (click)="goToDetail(c.id)"
        style="cursor: pointer;"
      >
        <app-course-card [course]="c"></app-course-card>
      </div>
    </div>
  </div>

  <ng-template #noCourses>
    <p style="color: #64748b; font-style: italic; margin-top: 1rem;">
      No courses found matching "{{ searchTerm }}".
    </p>
  </ng-template>
</div>
