<div class="home-container">
  <div class="welcome-header">
    <h2>Welcome to the {{ portalName }}</h2>
    <p>Manage and track your enrolled courses and academic performance here.</p>
  </div>

  <div class="dashboard">
    <div class="stat-card">
      <p>Courses Available</p>
      <b>12</b>
    </div>
    <div class="stat-card">
      <p>Enrolled Courses</p>
      <b>3</b>
    </div>
    <div class="stat-card">
      <p>GPA</p>
      <b>3.8</b>
    </div>
  </div>

  <div class="actions-section">
    <div>
      <button class="btn-primary" [disabled]="!isPortalActive" (click)="onEnrollClick()">Enroll Now</button>
      <p style="margin-top: 0.5rem; color: #16a34a; font-weight: 500;">{{ message }}</p>
    </div>

    <div class="search-box">
      <input [(ngModel)]="searchTerm" placeholder="Search courses..." />
      <p style="color: #64748b; font-size: 0.9rem;">Searching for: <b>{{ searchTerm }}</b></p>
    </div>
  </div>
</div>
