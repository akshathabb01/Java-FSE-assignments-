<div class="home-container">
  <div class="welcome-header">
    <h2>Welcome to the {{ portalName }}</h2>
    <p>Manage and track your enrolled courses and academic performance here.</p>
  </div>

  <div class="dashboard">
    <div class="stat-card">
      <p>Courses Available</p>
      <!-- Bound to live CourseService count -->
      <b>{{ coursesCount }}</b>
    </div>
    <div class="stat-card">
      <p>Enrolled Courses</p>
      <!-- Bound to live EnrollmentService count -->
      <b>{{ enrollmentService.getEnrolledCourses().length }}</b>
    </div>
    <div class="stat-card">
      <p>GPA</p>
      <b>3.8</b>
    </div>
  </div>

  <div class="actions-section">
    <div style="display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
      <button class="btn-primary" [disabled]="!isPortalActive" (click)="onEnrollClick()">Enroll Now</button>
      <button class="btn-secondary" (click)="addSampleCourse()">+ Add Course to Service</button>
    </div>

    <p style="margin-top: 0.5rem; color: #16a34a; font-weight: 500;">{{ message }}</p>

    <div class="search-box">
      <input [(ngModel)]="searchTerm" placeholder="Search courses..." />
      <p style="color: #64748b; font-size: 0.9rem;">Searching for: <b>{{ searchTerm }}</b></p>
    </div>
  </div>

  <!-- Hierarchical DI Scoped Notification Widget -->
  <app-notification></app-notification>

  <!-- Live Course List -->
  <app-course-list></app-course-list>
</div>
